name: "kxkb cz 3+2 5r4c 1.3.5"
attributes: { useKeySpecShortcut: false, moreKeyMode: OnlyExplicit }
numberRowMode: AlwaysDisabled
overrideWidths: { Custom1: 0.2, Custom2: 0.25, Custom3: 0.0857143 }

rows:
  # --- row 0: number / symbol top row (number tap, symbol on shift) ---
  - letters:
      - { type: case, normal: { type: compass, primary: "1", up: "@" }, shiftedManually: { type: compass, primary: "@", up: "1" } }
      - { type: case, normal: { type: compass, primary: "2", up: "ů" }, shiftedManually: { type: compass, primary: "ů", up: "2" } }
      - { type: case, normal: { type: compass, primary: "3", up: "(", down: "[" }, shiftedManually: { type: compass, primary: "(", up: "3", down: "[" } }
      - { type: case, normal: { type: compass, primary: "4", up: "\"" }, shiftedManually: { type: compass, primary: "\"", up: "4" } }
      - { type: case, normal: { type: compass, primary: "5", up: "*" }, shiftedManually: { type: compass, primary: "*", up: "5" } }
      - { type: case, normal: { type: compass, primary: "6", up: "0" }, shiftedManually: { type: compass, primary: "0", up: "6" } }
      - { type: case, normal: { type: compass, primary: "7", up: ")", down: "]" }, shiftedManually: { type: compass, primary: ")", up: "7", down: "]" } }
      - { type: case, normal: { type: compass, primary: "8", up: "´", down: "ˇ" }, shiftedManually: { type: compass, primary: "´" } }
      - { type: case, normal: { type: compass, primary: "9", up: "↶|!code/action_undo", down: "↷|!code/action_redo" }, shiftedManually: { type: compass, primary: "ˇ", up: "↶|!code/action_undo", down: "↷|!code/action_redo" } }
      - { type: compass, primary: "’", left: "´", up: "\"", right: "ˇ", down: "'", upLeft: "¯", upRight: "¨", downRight: "+", downLeft: "˚" }
      - { type: case, normal: { type: compass, primary: "0", up: "〇", down: "▾|!code/action_hide_keyboard" }, shiftedManually: { type: compass, primary: "'", up: "〇", down: "▾|!code/action_hide_keyboard" } }

  # --- row 1 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "„c“", up: "'", down: "…" }, shifted: { type: cluster, main: "„C“", up: "'", down: "…" } }
      - { type: case, normal: { type: cluster, main: "mwk", up: "8" }, shifted: { type: cluster, main: "MWK", up: "8" } }
      - { type: case, normal: { type: cluster, main: "qfr", up: "↶|!code/action_undo", down: "↷|!code/action_redo" }, shifted: { type: cluster, main: "QFR", up: "↶|!code/action_undo", down: "↷|!code/action_redo" } }
      - { type: case, normal: { type: cluster, main: "´lˇ", up: "〇", down: "▾|!code/action_hide_keyboard", upLeft: "¯", upRight: "¨", downLeft: "˚" }, shifted: { type: cluster, main: "´Lˇ", up: "〇", down: "▾|!code/action_hide_keyboard", upLeft: "¯", upRight: "¨", downLeft: "˚" } }
    attributes: { width: Custom2 }

  # --- row 2 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "(io", up: "3", down: "✂|!code/action_cut" }, shifted: { type: cluster, main: "(IO", up: "3", down: "✂|!code/action_cut" } }
      - { type: case, normal: { type: cluster, main: "aev", up: "4", down: "⎘|!code/action_paste" }, shifted: { type: cluster, main: "AEV", up: "4", down: "⎘|!code/action_paste" } }
      - { type: case, normal: { type: cluster, main: "btn", up: "5", down: "⧉|!code/action_copy" }, shifted: { type: cluster, main: "BTN", up: "5", down: "⧉|!code/action_copy" } }
      - { type: case, normal: { type: cluster, main: "sh)", up: "6", down: "⇥|!code/key_tab" }, shifted: { type: cluster, main: "SH)", up: "6", down: "⇥|!code/key_tab" } }
    attributes: { width: Custom2 }

  # --- row 3 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "!x?", up: "…" }, shifted: { type: cluster, main: "!X?", up: "…" } }
      - { type: case, normal: { type: cluster, main: "puz", up: "ů", down: ";" }, shifted: { type: cluster, main: "PUZ", up: "Ů", down: ";" } }
      - { type: case, normal: { type: cluster, main: "gdy", up: "2", down: ":" }, shifted: { type: cluster, main: "GDY", up: "2", down: ":" } }
      - { type: case, normal: { type: cluster, main: "–j_", up: "-", down: "—" }, shifted: { type: cluster, main: "–J_", up: "-", down: "—" } }
    attributes: { width: Custom2 }

  # --- row 4: bottom functional row ---
  - bottom:
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
      - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
      - { type: cluster, main: ";.:", up: "…" }
      - { type: cluster, main: "?,!", up: "…" }
      - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
      - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
      - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
      - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
altPages:
  # ===== alt0  (sym) =====
  - - letters: [ "@", "_", "-", "<", ">", "&", "$", "€", "%", "‰", "‱" ]
    - letters:
        - { type: macro, text: "–", label: "en–" }
        - { type: macro, text: "—", label: "em—" }
        - { type: macro, text: "-", label: "ASCII minus-" }
        - { type: macro, text: "‐", label: "hyphen‐" }
        - { type: macro, text: "‒", label: "fig.‒" }
        - { type: macro, text: "−", label: "typg.minus−" }
        - { type: macro, text: "―", label: "quot.―" }
        - { type: macro, text: "⁓", label: "swung⁓" }
        - { type: macro, text: "⸺", label: "⸺" }
        - { type: macro, text: "⸻", label: "⸻" }
    - letters: [ "⒈", "⒉", "⒊", "⒋", "⒌", "⒍", "⒎", "⒏", "⒐", "⒑", { type: macro, text: "🄀", label: "🄀" } ]
    - letters: [ "⒒", "⒓", "⒔", "⒕", "⒖", "⒗", "⒘", "⒙", "⒚", "⒛", "〇" ]
    - letters:
        - "„"
        - "“"
        - { type: macro, text: "′", label: "min/ft′" }
        - "‚"
        - "‘"
        - "»"
        - "«"
        - { type: macro, text: "″", label: "sec/in″" }
        - "‘"
        - "’"
        - { type: macro, text: "〃", label: "ditto〃" }
        - { type: macro, text: "’", label: "cz’" }
    - letters: [ "≅", "≈", "→", "⇒", "⇨", "=", "+", "*", "'", "\"" ]
    - letters: [ "|", "\\", "&", ":", ";", "?", "⅔", "!icon/action_voice_input|!code/action_voice_input", "#", "/" ]
    - bottom:
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Custom3, style: Functional, showPopup: false } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: cluster, main: ";.:", up: "…" }
        - { type: cluster, main: "?,!", up: "…" }
        - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
        - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
  # ===== alt1  (altGr) =====
  - - letters: [ "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⓪" ]
    - letters: [ "¹", "²", "³", "⁴", "⁵", "⁶", "⁷", "⁸", "⁹", "⁰", "⁻" ]
    - letters: [ "₁", "₂", "₃", "₄", "₅", "₆", "₇", "₈", "₉", "₀", "₋" ]
    - letters: [ "⁄", "⅟", "½", "⅓", "⅔", "¼", "¾", "⅕", "⅖", "⅗", "⅘" ]
    - letters: [ "⅙", "⅚", "⅐", "⅛", "⅜", "⅝", "⅞", "⅑", "⅒", "↉", "〇" ]
    - letters: [ "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳", "€" ]
    - letters: [ "㉑", "㉒", "㉓", "㉔", "㉕", "㉖", "㉗", "㉘", "㉙", "㉚", "¥" ]
    - letters: [ "㉛", "㉜", "㉝", "㉞", "㉟", "㊱", "㊲", "㊳", "㊴", "㊵", "$" ]
    - bottom:
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Custom3, style: Functional, showPopup: false } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: cluster, main: ";.:", up: "…" }
        - { type: cluster, main: "?,!", up: "…" }
        - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
        - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }