# kxkb 3+2 5r4c  —  Multiling O → FUTO v2 layout
#
# UPDATE 2026-05-26: cluster keys now SHOW their shifted (UPPERCASE) faces when Shift, caps-lock,
# or auto-caps is active. Each letter cluster is a CaseSelector now ({ type: case, normal: <lower>,
# shifted: <UPPER> } — `shifted` covers all three shift states). Previously only the committed
# output was capitalised while the key face stayed lower-case. Width attrs are carried into both
# variants; punctuation/digit/symbol clusters (?!@%, ;.,, the number row) are unchanged.
# Source: kxkb_cz_3_2_5r4c_1_3_4.txt  (Czech "side-columns" layout, v1.3.4)
#
# MAPPING DECISIONS / CAVEATS (scan before testing):
#  * Number row (row 0): rendered as COMPASS keys (primary + up/down slides), not
#    clusters — the Multiling tokens have blank left/right mains, so a cluster would
#    carry phantom blank slide-letters. Each key is a CaseSelector: tap = number on
#    base, tap = symbol on shift (your "numbers primary unshifted" design).
#      - Key 8 on shift = dead-key ´ ; its shifted [Predict] slot was DROPPED (no FUTO eq).
#      - Key 9 on shift = dead-key ˇ .
#  * Dead-key compass [4D:’´"ˇ'´ˇ+=¨%]: last two glyphs (¨ %) dropped per your call;
#    the remaining 9 fill primary+8 in skill slot order.
#  * Letter rows (1-3): CLUSTERS (main string = left/centre/right, centre taps).
#    FUTO auto-caps only the CENTRE letter on shift; side mains and slide slots stay
#    as authored (so the Multiling main-vs-shifted side swaps like (→[ don't happen).
#  * Macros use label: (per your Special-keys screenshot) — all descriptive labels kept.
#  * sym page (alt0) had NO entry key in the source's base layers. Switch placed on the
#    bottom-row Tab key's DOWN slide (UP = altGr/alt1, DOWN = sym/alt0).
#  * DROPPED (no confident FUTO mapping — give me the codes and I'll add them):
#       [WDEL] (word delete) on row1 key2 ; [Predict] on row0 key8-shift and row3 key1.
#  * BEST-GUESS action codes — verify these exist in your fork:
#       action_undo, action_redo, action_cut, action_copy, action_paste,
#       key_tab, action_hide_keyboard, key_enter, key_space.
#    (action_undo + key_tab + action_hide_keyboard + action_paste are skill-documented;
#     action_redo / action_cut / action_copy are inferred.)
#  * Widths: FUTO's Regular width = total / (max keys in any row) = 1/11 here (number row),
#    so the 4-cluster letter rows would only fill 4/11 and clump in the centre. Fixed by
#    giving rows 1-3 a row-level `attributes: { width: Custom2 }` with Custom2 = 0.25, so the
#    four clusters fill the row (4 × 0.25 = 1.0). BOTTOM ROW (matches the GNU 5r13c fix): the
#    engine derives one shared functional-key width from the whole layout, and this layout has no
#    functional key in a letter row to anchor it small — so the bottom-row functional keys are
#    pinned to explicit widths instead. Spacebars = Custom1 (0.2, wide); shift/delete/enter and the
#    alt-page return = Custom3 (0.0857 ≈ 0.6/7); clusters + Tab stay Regular and auto-fill to the
#    same 0.0857. Each bottom row is self-contained and sums to 1.0 (uniform middle, no cram).
#    Delete keeps hold-to-repeat; enter keeps its Action accent but no longer morphs its icon to
#    the IME action (Go/Search/Send) — say if you'd rather keep the adaptive $enter. The finer
#    per-key []-extender widths (Shift=2, the
#    double-width sym macro keys, etc.) are still not individually set — say if you want them exact.
#  * 〇 (U+3007) kept as a literal character in its slots.
#  * Ignored per scope: num, symShifted, altGrShifted, topBar.
#  * CRASH FIX (verified vs fork source CompassKey.kt + MoreKeysBuilder.kt): top-level
#    `attributes: { useKeySpecShortcut: false, moreKeyMode: OnlyExplicit }`. A cluster's slide
#    slots decode as default BaseKeys (moreKeyMode=All); on a letter row that calls
#    getNumForCoordinate/symsForCoord -> numColumnsByRow[regularRow] (unchecked). Cluster &
#    compass keys don't count toward coordinates, so numColumnsByRow is shorter than the row
#    count and [regularRow] throws "Index: 1, Size: 1". moreKeyMode: OnlyExplicit gates that
#    path off for EVERY key (base letter rows, cluster slots, AND the alt-page letter rows --
#    those bare keys would hit the same crash once Base stopped failing). The layout is all
#    explicit/slide-based, so no auto long-press is wanted anyway. useKeySpecShortcut: false
#    keeps `$` literal. (Cluster main-splitting is main.codePoints(), independent of both
#    flags.) Proper upstream fix: getOrNull in MoreKeysBuilder.getNumForCoordinate/symsForCoord.

name: "kxkb cz 3+2 5r4c 1.3.4"
attributes: { useKeySpecShortcut: false, moreKeyMode: OnlyExplicit }
numberRowMode: AlwaysDisabled
overrideWidths: { Custom1: 0.2, Custom2: 0.25, Custom3: 0.0857143 }

rows:
  # --- row 0: number / symbol top row (number tap, symbol on shift) ---
  - letters:
      - { type: case, normal: { type: compass, primary: "1", up: "@" }, shiftedManually: { type: compass, primary: "@", up: "1" } }
      - { type: case, normal: { type: compass, primary: "2", up: "ů" }, shiftedManually: { type: compass, primary: "ů", up: "2" } }
      - { type: case, normal: { type: compass, primary: "3", up: "(", down: "[" }, shiftedManually: { type: compass, primary: "(", up: "3", down: "[" } }
      - { type: case, normal: { type: compass, primary: "4", up: "\"" }, shiftedManually: { type: compass, primary: "\"", up: "4" } }
      - { type: case, normal: { type: compass, primary: "5", up: "*" }, shiftedManually: { type: compass, primary: "*", up: "5" } }
      - { type: case, normal: { type: compass, primary: "6", up: "0" }, shiftedManually: { type: compass, primary: "0", up: "6" } }
      - { type: case, normal: { type: compass, primary: "7", up: ")", down: "]" }, shiftedManually: { type: compass, primary: ")", up: "7", down: "]" } }
      - { type: case, normal: { type: compass, primary: "8", up: "´", down: "ˇ" }, shiftedManually: { type: compass, primary: "´" } }
      - { type: case, normal: { type: compass, primary: "9", up: "↶|!code/action_undo", down: "↷|!code/action_redo" }, shiftedManually: { type: compass, primary: "ˇ", up: "↶|!code/action_undo", down: "↷|!code/action_redo" } }
      - { type: compass, primary: "’", left: "´", up: "\"", right: "ˇ", down: "'", upLeft: "´", upRight: "ˇ", downRight: "+", downLeft: "=" }
      - { type: case, normal: { type: compass, primary: "0", up: "〇", down: "▾|!code/action_hide_keyboard" }, shiftedManually: { type: compass, primary: "'", up: "〇", down: "▾|!code/action_hide_keyboard" } }

  # --- row 1 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "„c“", up: "'", down: "…" }, shifted: { type: cluster, main: "„C“", up: "'", down: "…" } }
      - { type: case, normal: { type: cluster, main: "mwk", up: "8" }, shifted: { type: cluster, main: "MWK", up: "8" } }
      - { type: case, normal: { type: cluster, main: "qfr", up: "↶|!code/action_undo", down: "↷|!code/action_redo" }, shifted: { type: cluster, main: "QFR", up: "↶|!code/action_undo", down: "↷|!code/action_redo" } }
      - { type: case, normal: { type: cluster, main: "´lˇ", up: "〇", down: "▾|!code/action_hide_keyboard" }, shifted: { type: cluster, main: "´Lˇ", up: "〇", down: "▾|!code/action_hide_keyboard" } }
    attributes: { width: Custom2 }

  # --- row 2 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "(io", up: "3", down: "✂|!code/action_cut" }, shifted: { type: cluster, main: "(IO", up: "3", down: "✂|!code/action_cut" } }
      - { type: case, normal: { type: cluster, main: "aev", up: "4", down: "⎘|!code/action_paste" }, shifted: { type: cluster, main: "AEV", up: "4", down: "⎘|!code/action_paste" } }
      - { type: case, normal: { type: cluster, main: "btn", up: "5", down: "⧉|!code/action_copy" }, shifted: { type: cluster, main: "BTN", up: "5", down: "⧉|!code/action_copy" } }
      - { type: case, normal: { type: cluster, main: "sh)", up: "6", down: "⇥|!code/key_tab" }, shifted: { type: cluster, main: "SH)", up: "6", down: "⇥|!code/key_tab" } }
    attributes: { width: Custom2 }

  # --- row 3 ---
  - letters:
      - { type: case, normal: { type: cluster, main: "!x?", up: "…" }, shifted: { type: cluster, main: "!X?", up: "…" } }
      - { type: case, normal: { type: cluster, main: "puz", up: "ů", down: ";" }, shifted: { type: cluster, main: "PUZ", up: "Ů", down: ";" } }
      - { type: case, normal: { type: cluster, main: "gdy", up: "2", down: ":" }, shifted: { type: cluster, main: "GDY", up: "2", down: ":" } }
      - { type: case, normal: { type: cluster, main: "–j_", up: "-", down: "—" }, shifted: { type: cluster, main: "–J_", up: "-", down: "—" } }
    attributes: { width: Custom2 }

  # --- row 4: bottom functional row ---
  - bottom:
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
      - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
      - { type: cluster, main: ";.:", up: "…" }
      - { type: cluster, main: "?,!", up: "…" }
      - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
      - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
      - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
      - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
altPages:
  # ===== alt0  (sym) =====
  - - letters: [ "@", "_", "-", "<", ">", "&", "$", "€", "%", "‰", "‱" ]
    - letters:
        - { type: macro, text: "–", label: "en–" }
        - { type: macro, text: "—", label: "em—" }
        - { type: macro, text: "-", label: "ASCII minus-" }
        - { type: macro, text: "‐", label: "hyphen‐" }
        - { type: macro, text: "‒", label: "fig.‒" }
        - { type: macro, text: "−", label: "typg.minus−" }
        - { type: macro, text: "―", label: "quot.―" }
        - { type: macro, text: "⁓", label: "swung⁓" }
        - { type: macro, text: "⸺", label: "⸺" }
        - { type: macro, text: "⸻", label: "⸻" }
    - letters: [ "⒈", "⒉", "⒊", "⒋", "⒌", "⒍", "⒎", "⒏", "⒐", "⒑", { type: macro, text: "🄀", label: "🄀" } ]
    - letters: [ "⒒", "⒓", "⒔", "⒕", "⒖", "⒗", "⒘", "⒙", "⒚", "⒛", "〇" ]
    - letters:
        - "„"
        - "“"
        - { type: macro, text: "′", label: "min/ft′" }
        - "‚"
        - "‘"
        - "»"
        - "«"
        - { type: macro, text: "″", label: "sec/in″" }
        - "‘"
        - "’"
        - { type: macro, text: "〃", label: "ditto〃" }
        - { type: macro, text: "’", label: "cz’" }
    - letters: [ "≅", "≈", "→", "⇒", "⇨", "=", "+", "*", "'", "\"" ]
    - letters: [ "|", "\\", "&", ":", ";", "?", "⅔", "!icon/action_voice_input|!code/action_voice_input", "#", "/" ]
    - bottom:
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Custom3, style: Functional, showPopup: false } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: cluster, main: ";.:", up: "…" }
        - { type: cluster, main: "?,!", up: "…" }
        - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
        - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }
  # ===== alt1  (altGr) =====
  - - letters: [ "①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⓪" ]
    - letters: [ "¹", "²", "³", "⁴", "⁵", "⁶", "⁷", "⁸", "⁹", "⁰", "⁻" ]
    - letters: [ "₁", "₂", "₃", "₄", "₅", "₆", "₇", "₈", "₉", "₀", "₋" ]
    - letters: [ "⁄", "⅟", "½", "⅓", "⅔", "¼", "¾", "⅕", "⅖", "⅗", "⅘" ]
    - letters: [ "⅙", "⅚", "⅐", "⅛", "⅜", "⅝", "⅞", "⅑", "⅒", "↉", "〇" ]
    - letters: [ "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳", "€" ]
    - letters: [ "㉑", "㉒", "㉓", "㉔", "㉕", "㉖", "㉗", "㉘", "㉙", "㉚", "¥" ]
    - letters: [ "㉛", "㉜", "㉝", "㉞", "㉟", "㊱", "㊲", "㊳", "㊴", "㊵", "$" ]
    - bottom:
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Custom3, style: Functional, showPopup: false } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: cluster, main: ";.:", up: "…" }
        - { type: cluster, main: "?,!", up: "…" }
        - { type: compass, primary: "⇥|!code/key_tab", up: "altGr|!code/key_to_alt_1_layout", down: "sym|!code/key_to_alt_0_layout" }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Custom3, repeatableEnabled: true } }
        - { type: base, spec: "!icon/enter_key|!code/key_enter", attributes: { width: Custom3, style: Action } }
        - { type: base, attributes: { width: Custom1, style: Spacebar }, spec: "!icon/space_key|!code/key_space" }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom3 } }