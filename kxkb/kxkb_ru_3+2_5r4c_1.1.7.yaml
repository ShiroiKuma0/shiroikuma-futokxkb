name: "kxkb ru 3+2 5r4c 1.1.7"
attributes: { useKeySpecShortcut: false, moreKeyMode: OnlyExplicit }
numberRowMode: AlwaysDisabled
minimumFunctionalKeyWidth: 0.0
minimumBottomRowFunctionalKeyWidth: 0.0
overrideWidths: { Custom1: 0.0909091, Custom2: 0.25 }

rows:
  # row 0 — 7 digits + 3 clusters = 10 keys (widest → Regular = 1/10, fills on its own)
  - letters:
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "6"
      - "7"
      - { type: cluster, main: "8", up: "!icon/action_undo|!code/action_undo", down: "!icon/action_redo|!code/action_redo" }
      - { type: cluster, main: "9", down: { chord: "C-s", label: "C-s" } }
      - { type: cluster, main: "0", up: "〇", down: "!icon/action_hide_keyboard|!code/action_hide_keyboard" }
  # row 1 — 4 clusters ([WDEL] dropped)
  - letters:
      - { type: case, normal: { type: cluster, main: "чц»", up: "«", down: "!icon/action_redo|!code/action_redo" }, shifted: { type: cluster, main: "ЧЦ»", up: "«", down: "!icon/action_redo|!code/action_redo" } }
      - { type: case, normal: { type: cluster, main: "жмк", up: "8" }, shifted: { type: cluster, main: "ЖМК", up: "8" } }
      - { type: case, normal: { type: cluster, main: "фяр", up: "9", down: "!icon/action_select_all|!code/action_select_all" }, shifted: { type: cluster, main: "ФЯР", up: "9", down: "!icon/action_select_all|!code/action_select_all" } }
      - { type: case, normal: { type: cluster, main: "элё", up: "0", down: "!icon/action_undo|!code/action_undo" }, shifted: { type: cluster, main: "ЭЛЁ", up: "0", down: "!icon/action_undo|!code/action_undo" } }
    attributes: { width: Custom2 }
  # row 2 — 4 clusters ([Predict] dropped on юио)
  - letters:
      - { type: case, normal: { type: cluster, main: "юио", down: "!icon/action_cut|!code/action_cut" }, shifted: { type: cluster, main: "ЮИО", down: "!icon/action_cut|!code/action_cut" } }
      - { type: case, normal: { type: cluster, main: "аев", up: "ё", down: "!icon/action_paste|!code/action_paste" }, shifted: { type: cluster, main: "АЕВ", up: "Ё", down: "!icon/action_paste|!code/action_paste" } }
      - { type: case, normal: { type: cluster, main: "бтн", up: "5", down: "!icon/action_copy|!code/action_copy" }, shifted: { type: cluster, main: "БТН", up: "5", down: "!icon/action_copy|!code/action_copy" } }
      - { type: case, normal: { type: cluster, main: "схш", up: "щ", down: "!icon/tab_key|!code/key_tab" }, shifted: { type: cluster, main: "СХШ", up: "Щ", down: "!icon/tab_key|!code/key_tab" } }
    attributes: { width: Custom2 }
  # row 3 — 4 clusters ([Predict] dropped on «ь»)
  - letters:
      - { type: case, normal: { type: cluster, main: "«ь»", down: "ъ" }, shifted: { type: cluster, main: "«Ь»", down: "Ъ" } }
      - { type: case, normal: { type: cluster, main: "пуз", up: "1", down: ";" }, shifted: { type: cluster, main: "ПУЗ", up: "1", down: ";" } }
      - { type: case, normal: { type: cluster, main: "гды", up: "2", down: ":" }, shifted: { type: cluster, main: "ГДЫ", up: "2", down: ":" } }
      - { type: case, normal: { type: cluster, main: "—й_", up: "-", down: "—" }, shifted: { type: cluster, main: "—Й_", up: "-", down: "—" } }
    attributes: { width: Custom2 }
  # row 4 — bottom. cells: shift2 space4 clu2 clu2 Tab2 Ctrl2 Enter2 space4 shift2 = 22; non-space = Custom1 (2/22)
  - bottom:
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom1 } }
      - $space
      - { type: cluster, main: "?!@%", attributes: { width: Custom1 } }
      - { type: cluster, main: ";.,", up: ":", down: "…", attributes: { width: Custom1 } }
      - { type: base, spec: "!icon/tab_key|!code/key_tab", attributes: { width: Custom1 } }
      - { type: compass, primary: "Ctrl|!code/key_ctrl", up: "sym|!code/key_to_alt_0_layout", attributes: { width: Custom1 } }
      - { type: compass, primary: "!icon/enter_key|!code/key_enter", up: "altGr|!code/key_to_alt_1_layout", attributes: { width: Custom1 } }
      - $space
      - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Custom1 } }

altPages:
  # ---- alt0 (sym) ---- 6 letter rows of 10 + bottom; all letter rows fill at Regular = 1/10
  - - letters: [ "1","2","3","4","5","6","7","8","9","0" ]
    - letters:
        - "_"
        - "-"
        - "<"
        - ">"
        - "&"
        - "%"
        - "@"
        - "🄀"
        - { type: macro, text: "10" }
        - "〇"
    - letters: [ "⒈","⒉","⒊","⒋","⒌","⒍","⒎","⒏","⒐","⒑" ]
    - letters: [ "⒒","⒓","⒔","⒕","⒖","⒗","⒘","⒙","⒚","⒛" ]
    - letters: [ "≅","≈","→","⇒","⇨","=","+","*","'","\"" ]
    - letters:
        - "|"
        - "\\"
        - "&"
        - ":"
        - ";"
        - "?"
        - "⅔"
        - "!icon/action_voice_input|!code/action_voice_input"
        - "#"
        - "/"
    # bottom: gear clu clu Tab space(2c) Enter return shift del = 10 cells; 1-cell = Regular, space = Grow→0.2
    - bottom:
        - "!icon/settings_key|!code/key_settings"
        - { type: cluster, main: "?!@%" }
        - { type: cluster, main: ";.,", up: ":", down: "…" }
        - "!icon/tab_key|!code/key_tab"
        - $space
        - { type: compass, primary: "!icon/enter_key|!code/key_enter", up: "altGr|!code/key_to_alt_1_layout" }
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Regular, style: Functional, showPopup: false } }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Regular } }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Regular, repeatableEnabled: true } }
  # ---- alt1 (altGr) ---- 6 letter rows of 10 + bottom
  - - letters: [ "①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩" ]
    - letters: [ "¹","²","³","₂","½","⅓","⅔","¼","¾","⓪" ]
    - letters: [ "⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳" ]
    - letters: [ "㉑","㉒","㉓","㉔","㉕","㉖","㉗","㉘","㉙","㉚" ]
    - letters: [ "㉛","㉜","㉝","㉞","㉟","㊱","㊲","㊳","㊴","㊵" ]
    - letters: [ "㊶","㊷","㊸","㊹","㊺","㊻","㊼","㊽","㊾","㊿" ]
    - bottom:
        - "!icon/settings_key|!code/key_settings"
        - { type: cluster, main: "?!@%" }
        - { type: cluster, main: ";.,", up: ":", down: "…" }
        - "!icon/tab_key|!code/key_tab"
        - $space
        - { type: compass, primary: "!icon/enter_key|!code/key_enter", up: "altGr|!code/key_to_alt_1_layout" }
        - { type: base, spec: "← ABC|!code/key_to_alpha_0_layout", attributes: { width: Regular, style: Functional, showPopup: false } }
        - { type: base, spec: "!icon/shift_key|!code/key_shift", attributes: { width: Regular } }
        - { type: base, spec: "!icon/delete_key|!code/key_delete", attributes: { width: Regular, repeatableEnabled: true } }
